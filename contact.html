<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Florida Lis Pendens</title>
    <meta name="description" content="Get in touch with Florida Lis Pendens Data. Questions, support, or custom inquiries.">
    <style>
        :root {
            --navy: #1a3a5c;
            --forest: #2d5a3d;
            --gold: #c9a227;
            --cream: #f8f9fa;
            --text: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--cream); color: var(--text); line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { color: var(--navy); font-size: 1.75rem; }
        .subtitle { color: var(--gold); font-weight: 600; margin-top: 0.5rem; }
        .form-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--navy); }
        input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); }
        .btn { background: var(--forest); color: white; padding: 1rem; border: none; border-radius: 4px; font-weight: 600; font-size: 1rem; cursor: pointer; width: 100%; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .back-link { text-align: center; margin-top: 1.5rem; }
        .back-link a { color: var(--forest); }
        .note { background: #d4edda; padding: 1rem; border-radius: 4px; margin-bottom: 1.5rem; font-size: 0.9rem; color: #155724; border-left: 4px solid var(--gold); }
        footer { text-align: center; margin-top: 3rem; padding: 1rem; font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Contact Us</h1>
            <p class="subtitle">Questions? We're here to help.</p>
        </header>
        
        <div class="form-card">
            <div class="note">
                💬 Have questions about our data services? Need custom data options? Fill out the form below and our team will respond within 24 hours.
            </div>
            
            <form id="contactForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="formType" name="formType" value="Contact">
                
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="(850) 123-4567">
                </div>
                
                <div class="form-group">
                    <label for="business">Business Type</label>
                    <select id="business" name="business">
                        <option value="">Select...</option>
                        <option value="real-estate-investor">Real Estate Investor</option>
                        <option value="agent-broker">Real Estate Agent/Broker</option>
                        <option value="mortgage-lender">Mortgage Lender</option>
                        <option value="title-company">Title Company</option>
                        <option value="attorney">Attorney</option>
                        <option value="homeowner">Homeowner</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
                </div>
                
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
        
        <div class="back-link">
            <a href="../index.html">← Back to Home</a>
        </div>
        
        <footer>
            <p>📞 (850) 998-8500 | 📧 lars@my850.com</p>
            <p>© My850 Real Estate — Florida Lis Pendens Data</p>
        </footer>
    </div>
    
    <script>
        function handleSubmit(e) {
            e.preventDefault();
            
            const formData = {
                formType: 'Contact',
                timestamp: new Date().toISOString(),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value || '',
                business: document.getElementById('business').value || '',
                counties: '',
                dataFormat: '',
                marketingVolume: '',
                propertyCounty: '',
                notes: document.getElementById('message').value,
                status: 'New'
            };
            
            // TODO: POST to Google Apps Script when script URL configured
            console.log('Form Data:', formData);
            alert('Thank you for your message! Our team will respond within 24 hours.');
            
            // TODO: Replace with actual Google Script fetch when ready
            // fetch('YOUR_GOOGLE_SCRIPT_URL', {
            //     method: 'POST',
            //     body: JSON.stringify(formData)
            // });
        }
    </script>
</body>
</html>
